<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 模拟股票交易对敲撮合系统</h1>
            <nav>
                <a href="index.html" class="nav-link">概览</a>
                <a href="users.html" class="nav-link">用户管理</a>
                <a href="trading.html" class="nav-link">交易下单</a>
                <a href="orders.html" class="nav-link">订单历史</a>
                <a href="open-orders.html" class="nav-link">当前挂单</a>
                <a href="user-analysis.html" class="nav-link">用户分析</a>
                <a href="test.html" class="nav-link active">测试页</a>
            </nav>
        </header>

        <main>
            <section class="dashboard">
                <h2>前端功能测试</h2>

                <div class="card">
                    <h3>1. 基本页面渲染测试</h3>
                    <p class="info-text">如果你能看到这段文字，说明 HTML 和 CSS 正常。</p>
                    <div id="render-test" class="result-message success">✓ 页面渲染正常</div>
                </div>

                <div class="card">
                    <h3>2. JavaScript 加载测试</h3>
                    <button onclick="testJS()" class="btn btn-primary">测试 JavaScript</button>
                    <div id="js-test" class="result-message" style="display:none;"></div>
                </div>

                <div class="card">
                    <h3>3. API 配置测试</h3>
                    <button onclick="testConfig()" class="btn btn-primary">测试配置</button>
                    <div id="config-test" class="result-message" style="display:none;"></div>
                </div>

                <div class="card">
                    <h3>4. 健康检查 API 测试</h3>
                    <button onclick="testHealth()" class="btn btn-info">测试 Admin 健康检查</button>
                    <button onclick="testCoreHealth()" class="btn btn-info">测试 Core 健康检查</button>
                    <div id="health-test" class="result-message" style="display:none;"></div>
                </div>

                <div class="card">
                    <h3>5. 用户查询 API 测试</h3>
                    <button onclick="testUsers()" class="btn btn-success">测试用户查询</button>
                    <div id="users-test" class="result-message" style="display:none;"></div>
                </div>

                <div class="card">
                    <h3>6. 浏览器控制台检查</h3>
                    <p class="info-text">请按 F12 打开开发者工具，查看控制台（Console）标签页是否有错误信息。</p>
                    <button onclick="showConsoleInfo()" class="btn btn-secondary">显示控制台信息</button>
                    <div id="console-info" class="result-message info" style="display:none; white-space:pre-wrap;"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>模拟股票交易对敲撮合系统 © 2026</p>
        </footer>
    </div>

    <script>
        function testJS() {
            const el = document.getElementById('js-test');
            el.textContent = '✓ JavaScript 执行正常';
            el.className = 'result-message success';
            el.style.display = 'block';
        }

        function testConfig() {
            try {
                // 尝试加载配置
                const script = document.createElement('script');
                script.src = 'js/config.js';
                script.onload = () => {
                    setTimeout(() => {
                        if (typeof CONFIG !== 'undefined') {
                            const el = document.getElementById('config-test');
                            el.textContent =
                                '✓ 配置加载成功\n' + 
                                'ADMIN_BASE_URL: ' + CONFIG.ADMIN_BASE_URL + '\n' +
                                'CORE_BASE_URL: ' + CONFIG.CORE_BASE_URL;
                            el.className = 'result-message success';
                            el.style.display = 'block';
                        } else {
                            const el = document.getElementById('config-test');
                            el.textContent = '✗ CONFIG 未定义';
                            el.className = 'result-message error';
                            el.style.display = 'block';
                        }
                    }, 100);
                };
                script.onerror = () => {
                    const el = document.getElementById('config-test');
                    el.textContent = '✗ 无法加载 config.js';
                    el.className = 'result-message error';
                    el.style.display = 'block';
                };
                document.head.appendChild(script);
            } catch (e) {
                const el = document.getElementById('config-test');
                el.textContent = '✗ 错误: ' + e.message;
                el.className = 'result-message error';
                el.style.display = 'block';
            }
        }

        async function testHealth() {
            const resultEl = document.getElementById('health-test');
            resultEl.textContent = '测试中...';
            resultEl.className = 'result-message info';
            resultEl.style.display = 'block';
            
            try {
                const response = await fetch('http://localhost:8080/actuator/health');
                const data = await response.json();
                resultEl.textContent = '✓ Admin 健康检查成功\n' + JSON.stringify(data, null, 2);
                resultEl.className = 'result-message success';
            } catch (e) {
                resultEl.textContent = '✗ Admin 健康检查失败\n错误: ' + e.message + '\n\n可能原因:\n1. Admin 服务未启动\n2. CORS 跨域问题\n3. 网络连接问题';
                resultEl.className = 'result-message error';
            }
        }

        async function testCoreHealth() {
            const resultEl = document.getElementById('health-test');
            resultEl.textContent = '测试中...';
            resultEl.className = 'result-message info';
            resultEl.style.display = 'block';
            
            try {
                const response = await fetch('http://localhost:8081/actuator/health');
                const data = await response.json();
                resultEl.textContent = '✓ Core 健康检查成功\n' + JSON.stringify(data, null, 2);
                resultEl.className = 'result-message success';
            } catch (e) {
                resultEl.textContent = '✗ Core 健康检查失败\n错误: ' + e.message + '\n\n可能原因:\n1. Core 服务未启动\n2. CORS 跨域问题\n3. 网络连接问题';
                resultEl.className = 'result-message error';
            }
        }

        async function testUsers() {
            const resultEl = document.getElementById('users-test');
            resultEl.textContent = '测试中...';
            resultEl.className = 'result-message info';
            resultEl.style.display = 'block';
            
            try {
                const response = await fetch('http://localhost:8080/api/users');
                const data = await response.json();
                resultEl.textContent = '✓ 用户查询成功\n' + JSON.stringify(data, null, 2);
                resultEl.className = 'result-message success';
            } catch (e) {
                resultEl.textContent = '✗ 用户查询失败\n错误: ' + e.message + '\n\n可能原因:\n1. Admin 服务未启动\n2. CORS 跨域问题\n3. API 路径错误';
                resultEl.className = 'result-message error';
            }
        }

        function showConsoleInfo() {
            const info = `
请检查以下内容：

1. 打开浏览器开发者工具（F12）
2. 查看"控制台"（Console）标签页
3. 查看"网络"（Network）标签页
4. 检查是否有红色错误信息

常见错误：
- CORS 错误：需要确保使用 HTTP 服务器启动前端
- 404 错误：文件路径不正确
- 网络错误：后端服务未启动
            `;
            const el = document.getElementById('console-info');
            el.textContent = info;
            el.className = 'result-message info';
            el.style.display = 'block';
        }

        // 页面加载时自动测试
        window.onload = () => {
            console.log('测试页面加载完成');
            testJS();
        };
    </script>
</body>
</html>
