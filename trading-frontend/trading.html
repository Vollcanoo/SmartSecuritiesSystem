<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易下单 - CyberTrader</title>
    <link rel="stylesheet" href="css/style.css?v=2.2">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <div class="container">
        <header>
            <h1>CyberTrader<span class="subtitle">// 模拟股票交易对敲撮合系统 v2.0</span></h1>
            <nav>
                <a href="index.html" class="nav-link">概览</a>
                <a href="users.html" class="nav-link">用户管理</a>
                <a href="trading.html" class="nav-link active">交易终端</a>
                <a href="orders.html" class="nav-link">历史订单</a>
                <a href="open-orders.html" class="nav-link">当前挂单</a>
                <a href="market-data.html" class="nav-link">市场行情</a>
                <a href="ai-analytics.html" class="nav-link">智能分析</a>
            </nav>
        </header>

        <main>
            <section class="trading">
                <h2>交易下单</h2>

                <div class="card">
                    <h3>限价委托</h3>
                    <p class="info-text">系统自动生成订单号。下单前请查看行情页面确认价格在涨跌停范围内。</p>
                    <form id="place-order-form" class="form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="shareholderId">股东号:</label>
                                <input type="text" id="shareholderId" name="shareholderId" required maxlength="10" placeholder="SH00010001">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="market">市场:</label>
                                <select id="market" name="market" required>
                                    <option value="">-- SELECT --</option>
                                    <option value="XSHG">XSHG 上交所</option>
                                    <option value="XSHE">XSHE 深交所</option>
                                    <option value="BJSE">BJSE 北交所</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="securityId">证券代码:</label>
                                <input type="text" id="securityId" name="securityId" required maxlength="6" placeholder="600030">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="side">方向:</label>
                                <select id="side" name="side" required>
                                    <option value="">-- SELECT --</option>
                                    <option value="B">B → 买入 BID</option>
                                    <option value="S">S → 卖出 ASK</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="qty">数量:</label>
                                <input type="number" id="qty" name="qty" required min="1" placeholder="100">
                            </div>
                            <div class="form-group">
                                <label for="price">价格:</label>
                                <input type="number" id="price" name="price" required min="0.01" step="0.01" placeholder="10.50">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success">⚡ SUBMIT ORDER</button>
                    </form>
                    <div id="place-order-result" class="result-message"></div>
                </div>

                <div class="card">
                    <h3>✕ 撤单</h3>
                    <p class="info-text">输入原订单编号即可撤单，系统自动填充其他信息。</p>
                    <form id="cancel-order-form" class="form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="origClOrderId">原订单编号 (origClOrderId):</label>
                                <input type="text" id="origClOrderId" name="origClOrderId" required maxlength="64" placeholder="ORD17092345670001">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger">✕ CANCEL ORDER</button>
                    </form>
                    <div id="cancel-order-result" class="result-message"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>CyberTrader v2.0 // 模拟股票交易对敲撮合系统 © 2026</p>
        </footer>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/trading.js"></script>
</body>
</html>
