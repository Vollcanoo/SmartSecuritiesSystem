<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单历史 - 模拟股票交易对敲撮合系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 模拟股票交易对敲撮合系统</h1>
            <nav>
                <a href="index.html" class="nav-link">概览</a>
                <a href="users.html" class="nav-link">用户管理</a>
                <a href="trading.html" class="nav-link">交易下单</a>
                <a href="orders.html" class="nav-link active">订单历史</a>
                <a href="open-orders.html" class="nav-link">当前挂单</a>
                <a href="user-analysis.html" class="nav-link">用户分析</a>
                <a href="market.html" class="nav-link">行情</a>
            </nav>
        </header>

        <main>
            <section class="order-history">
                <h2>订单历史</h2>

                <div class="card">
                    <h3>查询条件</h3>
                    <form id="search-form" class="form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="search-shareholderId">股东号:</label>
                                <input type="text" id="search-shareholderId" name="shareholderId" maxlength="10" placeholder="可选，如: A123456789">
                            </div>
                            <div class="form-group">
                                <label for="search-status">状态:</label>
                                <select id="search-status" name="status">
                                    <option value="">全部</option>
                                    <option value="LIVE">LIVE - 挂单中</option>
                                    <option value="PARTIALLY_FILLED">PARTIALLY_FILLED - 部分成交</option>
                                    <option value="FILLED">FILLED - 全部成交</option>
                                    <option value="CANCELLED">CANCELLED - 已撤单</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="page-size">每页条数:</label>
                                <select id="page-size" name="size">
                                    <option value="20">20</option>
                                    <option value="50" selected>50</option>
                                    <option value="100">100</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">查询</button>
                        <button type="button" onclick="resetSearch()" class="btn btn-secondary">重置</button>
                    </form>
                </div>

                <div class="card">
                    <h3>订单列表</h3>
                    <div class="pagination-info">
                        <span id="pagination-info">第 0 页，共 0 条</span>
                        <div class="pagination">
                            <button id="prev-page" onclick="changePage(-1)" class="btn btn-sm" disabled>上一页</button>
                            <span id="current-page">1</span>
                            <button id="next-page" onclick="changePage(1)" class="btn btn-sm" disabled>下一页</button>
                            <button type="button" id="btn-delete-all-orders" class="btn btn-sm btn-danger" title="删除全部历史订单">删除全部</button>
                        </div>
                    </div>
                    <div id="orders-list" class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>订单编号</th>
                                    <th>股东号</th>
                                    <th>市场</th>
                                    <th>股票代码</th>
                                    <th>方向</th>
                                    <th>价格</th>
                                    <th>数量</th>
                                    <th>已成交</th>
                                    <th>已撤单</th>
                                    <th>状态</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="orders-table-body">
                                <tr><td colspan="12" class="loading">请输入查询条件并点击查询</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>模拟股票交易对敲撮合系统 © 2026</p>
        </footer>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/orders.js"></script>
</body>
</html>
