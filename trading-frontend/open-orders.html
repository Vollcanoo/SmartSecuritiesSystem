<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>当前挂单 - CyberTrader</title>
    <link rel="stylesheet" href="css/style.css?v=2.2">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <div class="container">
        <header>
            <h1>CyberTrader<span class="subtitle">// 模拟股票交易对敲撮合系统 v2.0</span></h1>
            <nav>
                <a href="index.html" class="nav-link">概览</a>
                <a href="users.html" class="nav-link">用户管理</a>
                <a href="trading.html" class="nav-link">交易终端</a>
                <a href="orders.html" class="nav-link">历史订单</a>
                <a href="open-orders.html" class="nav-link active">当前挂单</a>
                <a href="market-data.html" class="nav-link">市场行情</a>
                <a href="ai-analytics.html" class="nav-link">智能分析</a>
            </nav>
        </header>

        <main>
            <section class="open-orders">
                <h2>当前挂单</h2>

                <div class="card">
                    <h3>挂单查询</h3>
                    <form id="search-open-form" class="form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="open-shareholderId">股东号:</label>
                                <input type="text" id="open-shareholderId" name="shareholderId" required maxlength="10" placeholder="SH00010001">
                            </div>
                            <div class="form-group" style="justify-content:flex-end;">
                                <div style="display:flex;gap:8px;">
                                    <button type="submit" class="btn btn-primary">查询</button>
                                    <button type="button" onclick="loadOpenOrders()" class="btn btn-secondary">刷新</button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="card">
                    <h3>挂单列表</h3>
                    <div id="open-orders-list" class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>股东号</th>
                                    <th>市场</th>
                                    <th>代码</th>
                                    <th>方向</th>
                                    <th>价格</th>
                                    <th>数量</th>
                                    <th>已成交</th>
                                    <th>剩余</th>
                                </tr>
                            </thead>
                            <tbody id="open-orders-table-body">
                                <tr><td colspan="9" class="loading">ENTER SHAREHOLDER ID...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>CyberTrader v2.0 // 模拟股票交易对敲撮合系统 © 2026</p>
        </footer>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/open-orders.js"></script>
</body>
</html>
