server:
  port: 8080

spring:
  application:
    name: trading-admin
  datasource:
    url: jdbc:mysql://localhost:3306/trading_admin?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    # 生产可用环境变量: password: ${DB_PASSWORD:}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # 生产建议改为 validate，表结构用 Flyway/Liquibase 管理
      ddl-auto: update
    show-sql: true

# 内部接口鉴权：X-Internal-Token 与此处一致才可调用 /internal/**。留空则不做校验（仅适合内网/测试）
trading:
  admin:
    internal-token: ${INTERNAL_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.trading: DEBUG

